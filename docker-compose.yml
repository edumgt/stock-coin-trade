networks:
  shared-net:
    external: true
  internal:
    driver: bridge

services:

  # ── 프론트엔드 (Nginx + 정적 파일) ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: crypto-mock-frontend
    networks:
      - internal
    ports:
      - "3000:80"
    depends_on:
      - java-backend
    restart: unless-stopped

  # ── Java 백엔드 (Spring Boot REST API) ──────────────────────
  java-backend:
    build:
      context: .
      dockerfile: docker/java-backend.Dockerfile
    container_name: crypto-mock-java
    networks:
      - shared-net
      - internal
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://dbms.edumgt.co.kr:3306/mockinv?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "12345678!!"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PYTHON_STOCK_API_BASE_URL: http://python-backend:8200
    depends_on:
      python-backend:
        condition: service_started
    restart: on-failure

  # ── Python 백엔드 (Flask 주식 API) ──────────────────────────
  python-backend:
    build:
      context: .
      dockerfile: docker/python-backend.Dockerfile
    container_name: crypto-mock-python
    networks:
      - internal
    expose:
      - "8200"
    restart: unless-stopped
