services:
  db:
    image: mariadb:11.4
    container_name: crypto-mock-db
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: mockinv
      MARIADB_USER: mockinv
      MARIADB_PASSWORD: mockinv1234
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123456" ]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-mock-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/mockinv?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: mockinv
      SPRING_DATASOURCE_PASSWORD: mockinv1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PYTHON_STOCK_API_BASE_URL: http://stock-backend:8000
    ports:
      - "8080:8080"
    restart: unless-stopped

  stock-backend:
    build:
      context: .
      dockerfile: python-stock-backend/Dockerfile
    container_name: stock-practice-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  mariadb_data:
