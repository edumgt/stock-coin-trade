networks:
  shared-net:
    external: true

services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: crypto-mock-app
    networks:
      - shared-net
    depends_on:
      stock-backend:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://crypto-mock-db:3306/mockinv?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: mockinv
      SPRING_DATASOURCE_PASSWORD: mockinv1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PYTHON_STOCK_API_BASE_URL: http://stock-backend:8200
    ports:
      - "8083:8080"
    restart: on-failure

  stock-backend:
    build:
      context: .
      dockerfile: docker/stock-backend.Dockerfile
    container_name: stock-practice-backend
    networks:
      - shared-net
    ports:
      - "8200:8200"
    restart: unless-stopped
