<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">

<body layout:fragment="content">
<div class="mx-auto max-w-lg">
    <div class="glass-card p-8">
        <div class="text-center mb-6">
            <div class="brand-logo-text mb-3" style="font-size:24px;">EDUMGT</div>
            <h1 class="text-2xl font-black text-[#F2F2F2]">회원가입</h1>
            <p class="mt-2 text-sm text-[#888]">가입 즉시 거래 가능 자금</p>
            <p class="text-xl font-black text-[#FFCC00]">10,000,000 KRW 지급</p>
        </div>

        <form action="/member/register" th:action method="post" th:object="${memberRegisterForm}" class="space-y-4">
            <div th:if="${#fields.hasGlobalErrors()}"
                 style="background:rgba(190,18,60,0.12); border:1px solid rgba(190,18,60,0.35); border-radius:0.625rem; padding:0.75rem 1rem; font-size:15px; color:#fb7185;">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
            </div>

            <div>
                <label style="display:block; font-size:14px; font-weight:700; color:#888; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;" for="username">이름</label>
                <input type="text" class="dark-input" th:field="*{username}" id="username" placeholder="이름"/>
                <div class="mt-1 text-xs text-[#fb7185]" th:errors="*{username}">username 오류</div>
            </div>

            <div>
                <label style="display:block; font-size:14px; font-weight:700; color:#888; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;" for="email">아이디 (이메일)</label>
                <input type="email" class="dark-input" th:field="*{email}" id="email" placeholder="이메일 주소"/>
                <div class="mt-1 text-xs text-[#fb7185]" th:errors="*{email}">email 오류</div>
            </div>

            <div>
                <label style="display:block; font-size:14px; font-weight:700; color:#888; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;" for="password">비밀번호</label>
                <input type="password" class="dark-input" th:field="*{password}" id="password" placeholder="비밀번호"/>
                <div class="mt-1 text-xs text-[#fb7185]" th:errors="*{password}">password 오류</div>
            </div>

            <div>
                <label style="display:block; font-size:14px; font-weight:700; color:#888; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;" for="password2">비밀번호 확인</label>
                <input type="password" class="dark-input" th:field="*{password2}" id="password2" placeholder="비밀번호 재입력"/>
                <div class="mt-1 text-xs text-[#fb7185]" th:if="${#fields.hasErrors('password2')}" th:errors="*{password2}">password2 오류</div>
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-gold">가입하기</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
