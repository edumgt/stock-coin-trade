<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>주식 실습</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.0/dist/apexcharts.min.js"></script>
</head>
<body layout:fragment="content">

<!-- Page header -->
<section class="glass-card p-6">
    <div class="flex flex-wrap items-center gap-3">
        <h2 class="text-2xl font-black text-[#F2F2F2]">주식 거래 실습</h2>
        <span class="badge badge-gold">KOSPI · KOSDAQ</span>
        <span id="dataSourceBadge" class="hidden badge badge-muted">시뮬레이션</span>
    </div>
    <p class="mt-2 text-sm text-[#888]">한국 주식 시장(KOSPI · KOSDAQ) 실시간 시세 기반 가상 모의투자 실습입니다.</p>
</section>

<!-- Market indices -->
<section class="mt-5 grid grid-cols-2 gap-4">
    <article class="glass-card p-5">
        <div class="flex items-center justify-between">
            <span class="section-label">KOSPI</span>
            <span id="kospiChange" class="text-xs font-bold">-</span>
        </div>
        <p id="kospiPrice" class="mt-2 text-2xl font-black text-[#F2F2F2]">-</p>
        <p id="kospiChangeAmt" class="mt-1 text-sm text-[#888]">-</p>
    </article>
    <article class="glass-card p-5">
        <div class="flex items-center justify-between">
            <span class="section-label">KOSDAQ</span>
            <span id="kosdaqChange" class="text-xs font-bold">-</span>
        </div>
        <p id="kosdaqPrice" class="mt-2 text-2xl font-black text-[#F2F2F2]">-</p>
        <p id="kosdaqChangeAmt" class="mt-1 text-sm text-[#888]">-</p>
    </article>
</section>

<!-- Chart -->
<section class="mt-5 glass-card p-5">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-3">
            <select id="stockSymbol" class="dark-select" style="font-size:15px; font-weight:600;"></select>
            <span id="chartStockName" class="text-sm font-bold text-[#FFCC00]"></span>
        </div>
        <div class="flex items-center gap-1" id="periodBtns">
            <button data-period="1d"  class="period-btn">1일</button>
            <button data-period="1w"  class="period-btn">1주</button>
            <button data-period="1m"  class="period-btn active">1개월</button>
            <button data-period="3m"  class="period-btn">3개월</button>
            <button data-period="1y"  class="period-btn">1년</button>
        </div>
    </div>
    <div id="candleChart" class="mt-4" style="min-height:300px;"></div>
    <div id="volumeChart" class="mt-1" style="min-height:110px;"></div>
</section>

<!-- Quote / Account / Order -->
<section class="mt-5 grid grid-cols-1 gap-5 xl:grid-cols-3">

    <article class="glass-card p-5">
        <h3 class="text-base font-black text-[#F2F2F2] mb-4">현재 시세</h3>
        <div class="space-y-3">
            <div class="flex items-baseline justify-between">
                <span class="text-sm text-[#888]">현재가</span>
                <span id="quotePrice" class="text-xl font-black text-[#FFCC00]">-</span>
            </div>
            <div class="flex items-baseline justify-between" style="border-top:1px solid rgba(255,255,255,0.06); padding-top:0.6rem;">
                <span class="text-sm text-[#888]">전일 대비</span>
                <span id="quoteChange" class="font-bold">-</span>
            </div>
            <div class="flex items-baseline justify-between">
                <span class="text-sm text-[#888]">등락률</span>
                <span id="quoteChangeRate" class="font-bold">-</span>
            </div>
            <div class="flex items-baseline justify-between">
                <span class="text-sm text-[#888]">거래량</span>
                <span id="quoteVolume" class="font-semibold text-[#F2F2F2]">-</span>
            </div>
            <div class="flex items-baseline justify-between">
                <span class="text-sm text-[#888]">시장</span>
                <span id="quoteMarket" class="badge badge-muted">-</span>
            </div>
        </div>
    </article>

    <article class="glass-card p-5">
        <h3 class="text-base font-black text-[#F2F2F2] mb-4">계좌 현황</h3>
        <div class="space-y-3">
            <div class="flex items-baseline justify-between">
                <span class="text-sm text-[#888]">보유 현금</span>
                <span id="accountCash" class="font-bold text-[#F2F2F2]">-</span>
            </div>
            <div class="flex items-baseline justify-between" style="border-top:1px solid rgba(255,255,255,0.06); padding-top:0.6rem;">
                <span class="text-sm text-[#888]">총 자산</span>
                <span id="accountAsset" class="font-bold text-[#F2F2F2]">-</span>
            </div>
            <div class="flex items-baseline justify-between">
                <span class="text-sm text-[#888]">수익률</span>
                <span id="accountPnlRate" class="font-black text-lg">-</span>
            </div>
        </div>
    </article>

    <article class="glass-card p-5">
        <h3 class="text-base font-black text-[#F2F2F2] mb-4">주문</h3>
        <div class="space-y-3">
            <input id="orderQty" type="number" min="1" step="1" placeholder="수량 (주)" class="dark-input"/>
            <div class="grid grid-cols-2 gap-2">
                <button id="buyBtn" type="button" class="btn-buy">매수</button>
                <button id="sellBtn" type="button" class="btn-sell">매도</button>
            </div>
            <p id="stockMessage" class="text-xs text-[#888]"></p>
        </div>
    </article>

</section>

<!-- Positions -->
<section class="mt-5 glass-card overflow-hidden">
    <div class="px-5 py-4" style="border-bottom:1px solid rgba(255,255,255,0.08);">
        <h3 class="text-base font-black text-[#F2F2F2]">보유 포지션</h3>
    </div>
    <div class="overflow-x-auto">
        <table class="dark-table min-w-full">
            <thead>
            <tr>
                <th class="text-left">종목</th>
                <th class="text-left">시장</th>
                <th class="text-right">수량</th>
                <th class="text-right">평균단가</th>
                <th class="text-right">현재가</th>
                <th class="text-right">평가금액</th>
                <th class="text-right">손익</th>
            </tr>
            </thead>
            <tbody id="positionsBody"></tbody>
        </table>
    </div>
</section>

<script th:src="@{/js/stock.js}"></script>
</body>
</html>
