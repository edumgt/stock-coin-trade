<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>주식 실습</title>
</head>
<body layout:fragment="content">
<section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="flex flex-wrap items-center gap-3">
        <h2 class="text-2xl font-bold text-slate-900">주식 거래 실습</h2>
        <span class="rounded-full bg-indigo-100 px-3 py-1 text-xs font-semibold text-indigo-700">Python Backend</span>
    </div>
    <p class="mt-2 text-sm text-slate-600">가상 잔고 기반으로 매수/매도 실습을 진행합니다.</p>
</section>

<section class="mt-5 grid grid-cols-1 gap-5 xl:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_minmax(0,1fr)]">
    <article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h3 class="text-base font-bold text-slate-900">현재 시세</h3>
        <div class="mt-4 space-y-2 text-sm">
            <div>
                <label for="stockSymbol" class="mb-1 block font-semibold text-slate-700">종목</label>
                <select id="stockSymbol" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                    <option value="AAPL">AAPL</option>
                    <option value="MSFT">MSFT</option>
                    <option value="NVDA">NVDA</option>
                    <option value="TSLA">TSLA</option>
                    <option value="AMZN">AMZN</option>
                </select>
            </div>
            <p class="text-slate-600">가격: <span id="quotePrice" class="font-semibold text-slate-900">-</span></p>
            <p class="text-slate-600">등락률: <span id="quoteChange" class="font-semibold text-slate-900">-</span></p>
            <p class="text-slate-500 text-xs">* 모의 실습용 가격입니다.</p>
        </div>
    </article>

    <article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h3 class="text-base font-bold text-slate-900">계좌 현황</h3>
        <div class="mt-4 space-y-2 text-sm text-slate-600">
            <p>보유 현금: <span id="accountCash" class="font-semibold text-slate-900">-</span></p>
            <p>총 자산: <span id="accountAsset" class="font-semibold text-slate-900">-</span></p>
            <p>수익률: <span id="accountPnlRate" class="font-semibold text-slate-900">-</span></p>
        </div>
    </article>

    <article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h3 class="text-base font-bold text-slate-900">주문</h3>
        <div class="mt-4 grid grid-cols-1 gap-3">
            <input id="orderQty" type="number" min="1" step="1" placeholder="수량"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"/>
            <div class="grid grid-cols-2 gap-2">
                <button id="buyBtn" type="button"
                        class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-emerald-700">
                    매수
                </button>
                <button id="sellBtn" type="button"
                        class="rounded-lg bg-rose-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-rose-700">
                    매도
                </button>
            </div>
            <p id="stockMessage" class="text-xs text-slate-600"></p>
        </div>
    </article>
</section>

<section class="mt-5 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <h3 class="text-base font-bold text-slate-900">보유 포지션</h3>
    <div class="mt-4 overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead class="bg-slate-50 text-xs uppercase text-slate-500">
            <tr>
                <th class="px-3 py-2 text-left">종목</th>
                <th class="px-3 py-2 text-right">수량</th>
                <th class="px-3 py-2 text-right">평균단가</th>
                <th class="px-3 py-2 text-right">현재가</th>
                <th class="px-3 py-2 text-right">평가금액</th>
                <th class="px-3 py-2 text-right">손익</th>
            </tr>
            </thead>
            <tbody id="positionsBody" class="divide-y divide-slate-100"></tbody>
        </table>
    </div>
</section>

<script th:src="@{/js/stock.js}"></script>
</body>
</html>
