<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>보유자산</title></head>
<body layout:fragment="content">

<div class="space-y-6">

    <!-- Summary -->
    <section class="glass-card p-6">
        <h2 class="text-center text-2xl font-black text-[#F2F2F2] mb-6">보유자산 현황</h2>

        <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
            <div class="space-y-3">
                <!-- Top stats -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="stat-card">
                        <div class="stat-label">보유 KRW</div>
                        <div class="stat-value">
                            <span id="member_asset" th:text="${#numbers.formatInteger(memberAsset,1,'COMMA')}">-</span>
                            <span style="font-size:14px; font-weight:500; color:#888; margin-left:4px;">KRW</span>
                        </div>
                    </div>
                    <div class="stat-card" style="border-color:rgba(255,204,0,0.20); background:rgba(255,204,0,0.04);">
                        <div class="stat-label">총 보유자산</div>
                        <div class="stat-value text-[#FFCC00]">
                            <span id="total_member_asset">-</span>
                            <span style="font-size:14px; font-weight:500; color:#888; margin-left:4px;">KRW</span>
                        </div>
                    </div>
                </div>

                <!-- Mid stats -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="stat-card">
                        <div class="stat-label">총매수금액</div>
                        <div style="font-size:18px; font-weight:700; color:#F2F2F2; margin-top:0.25rem;">
                            <span id="total_buy_krw" th:text="${#numbers.formatInteger(totalBuyKrw,1,'COMMA')}">-</span>
                            <span style="font-size:13px; color:#888; margin-left:4px;">KRW</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">총평가손익</div>
                        <div style="font-size:18px; font-weight:700; margin-top:0.25rem;">
                            <span id="total_krw_of_return">-</span>
                            <span style="font-size:13px; color:#888; margin-left:4px;">KRW</span>
                        </div>
                    </div>
                </div>

                <!-- Bottom stats -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="stat-card">
                        <div class="stat-label">총평가금액</div>
                        <div style="font-size:18px; font-weight:700; color:#F2F2F2; margin-top:0.25rem;">
                            <span id="total_evaluation_krw">-</span>
                            <span style="font-size:13px; color:#888; margin-left:4px;">KRW</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">총평가수익률</div>
                        <div style="font-size:22px; font-weight:800; margin-top:0.25rem;">
                            <span id="total_evaluation_rate_of_return">-</span>
                            <span style="font-size:13px; color:#888; margin-left:2px;">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chart -->
            <div id="hold_asset_chart" class="min-h-[320px]"></div>
        </div>
    </section>

    <!-- Holdings table -->
    <section class="glass-card overflow-hidden">
        <div class="px-5 py-4" style="border-bottom:1px solid rgba(255,255,255,0.08);">
            <h3 class="text-base font-black text-[#F2F2F2]">보유 코인</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="dark-table min-w-full">
                <thead>
                <tr>
                    <th class="text-left">보유자산</th>
                    <th class="text-right">보유수량</th>
                    <th class="text-right">매수평균가</th>
                    <th class="text-right">매수금액</th>
                    <th class="text-right">평가금액</th>
                    <th class="text-right">평가손익 (%)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="holdCrypto : ${holdCryptoList}">
                    <td>
                        <div class="flex items-center gap-3">
                            <img th:src="@{|https://static.upbit.com/logos/${holdCrypto.marketCodeOnlySymbol}.png|}"
                                 alt="" class="h-9 w-9 rounded-full"
                                 style="border:1px solid rgba(255,255,255,0.12);"/>
                            <div>
                                <p class="font-bold text-[#F2F2F2]" th:text="${holdCrypto.koreanName}">비트코인</p>
                                <p class="text-xs text-[#FFCC00] font-semibold" th:text="${holdCrypto.marketCodeOnlySymbol}">BTC</p>
                            </div>
                        </div>
                    </td>
                    <td class="text-right">
                        <span class="font-semibold text-[#F2F2F2]"
                              th:id="|${holdCrypto.marketCode}-hold-count|"
                              th:text="${#numbers.formatDecimal(holdCrypto.holdCount,1,'COMMA',8,'POINT')}">0.03535</span>
                        <span class="ml-1 text-xs text-[#888]" th:text="${holdCrypto.marketCodeOnlySymbol}">BTC</span>
                    </td>
                    <td class="text-right">
                        <span class="font-semibold text-[#F2F2F2]"
                              th:id="|${holdCrypto.marketCode}-buy-average|"
                              th:text="${#numbers.formatDecimal(holdCrypto.buyAverage,1,'COMMA',4,'POINT')}">21,943,430</span>
                        <span class="ml-1 text-xs text-[#888]">KRW</span>
                    </td>
                    <td class="text-right">
                        <span class="font-semibold text-[#F2F2F2]"
                              th:id="|${holdCrypto.marketCode}-buy-total-krw|"
                              th:text="${#numbers.formatInteger(holdCrypto.buyTotalKrw,1,'COMMA')}">21,943,430</span>
                        <span class="ml-1 text-xs text-[#888]">KRW</span>
                    </td>
                    <td class="text-right" style="background:rgba(255,204,0,0.04);">
                        <span class="font-bold text-[#FFCC00]"
                              th:id="|${holdCrypto.marketCode}-evaluation-krw|">21,943,430</span>
                        <span class="ml-1 text-xs text-[#888]">KRW</span>
                    </td>
                    <td class="text-right">
                        <p class="mb-1">
                            <span class="font-bold" th:id="|${holdCrypto.marketCode}-krw-of-return|">-</span>
                            <span class="ml-1 text-xs text-[#888]">KRW</span>
                        </p>
                        <p>
                            <span class="font-black text-base" th:id="|${holdCrypto.marketCode}-rate-of-return|">-</span>
                            <span class="ml-1 text-xs text-[#888]">%</span>
                        </p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script th:inline="javascript">
    const marketArrayList = [[${marketArrayList}]];
    const holdCryptoList = [[${holdCryptoList}]];
</script>
<script th:src="@{/js/hold_crypto.js}"></script>
</body>
</html>
