<th:block th:fragment="orderInfoFragment">
    <div class="space-y-4">
        <div class="flex items-end gap-3">
            <h2 id="crypto_korean_name" class="text-4xl font-black" style="color:var(--fg);">-</h2>
            <span class="pb-1 text-lg font-semibold" style="color:var(--accent);" id="crypto_symbol_name">-</span>
        </div>

        <div id="trading_chart_view" class="overflow-hidden rounded-[var(--radius)]"
             style="border:1px solid var(--border);"></div>

        <div class="glass-card p-5">
            <div class="flex items-center gap-3 flex-wrap">
                <h5 class="text-base font-black" style="color:var(--fg);">
                    국내 4대 거래소 시세 비교 &mdash;
                    <span id="domestic_price_symbol" style="color:var(--accent);">BTC</span>
                </h5>
                <small id="domestic_price_updated_at" class="ml-auto text-xs" style="color:var(--muted);">-</small>
            </div>

            <div class="mt-4 flex flex-wrap items-center gap-3">
                <label style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;" for="domestic_exchange_select">거래소 선택</label>
                <select id="domestic_exchange_select" class="dark-select" style="height:6rem;" size="4" multiple>
                    <option value="UPBIT" selected>업비트</option>
                    <option value="BITHUMB" selected>빗썸</option>
                    <option value="COINONE" selected>코인원</option>
                    <option value="KORBIT" selected>코빗</option>
                </select>
                <small class="text-xs" style="color:var(--muted);">Ctrl/Cmd + 클릭으로 다중 선택</small>
            </div>

            <div class="mt-4 overflow-x-auto">
                <table class="dark-table min-w-full">
                    <thead>
                    <tr>
                        <th class="text-left" scope="col">거래소</th>
                        <th class="text-right" scope="col">현재가 (KRW)</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr id="domestic-row-UPBIT">
                        <td class="font-semibold" style="color:var(--fg);">업비트</td>
                        <td id="domestic-price-UPBIT" class="text-right font-black" style="color:var(--accent);">-</td>
                    </tr>
                    <tr id="domestic-row-BITHUMB">
                        <td class="font-semibold" style="color:var(--fg);">빗썸</td>
                        <td id="domestic-price-BITHUMB" class="text-right font-black" style="color:var(--accent);">-</td>
                    </tr>
                    <tr id="domestic-row-COINONE">
                        <td class="font-semibold" style="color:var(--fg);">코인원</td>
                        <td id="domestic-price-COINONE" class="text-right font-black" style="color:var(--accent);">-</td>
                    </tr>
                    <tr id="domestic-row-KORBIT">
                        <td class="font-semibold" style="color:var(--fg);">코빗</td>
                        <td id="domestic-price-KORBIT" class="text-right font-black" style="color:var(--accent);">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- TradingView Widget BEGIN -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">

        let domesticPriceTimer = null;
        let selectedDomesticMarketCode = 'KRW-BTC';
        const domesticExchangeCodes = ['UPBIT', 'BITHUMB', 'COINONE', 'KORBIT'];
        let latestDomesticPriceMap = {};

        window.addEventListener('DOMContentLoaded', function () {
            initializeDomesticExchangeSelect();
            getCryptoChartAndData('KRW-BTC');
        });

        function getCryptoChartAndData(marketCode) {
            startDomesticPricePolling(marketCode);

            let temps = marketCode.split("-");
            let chartSymbol = temps[1];

            new TradingView.widget({
                "width": "100%",
                "height": 520,
                custom_font_family: "'Pretendard', sans-serif",
                symbol: "UPBIT:" + chartSymbol + "KRW",
                interval: "D",
                timezone: "Asia/Seoul",
                theme: "light",
                style: "1",
                locale: "kr",
                enable_publishing: false,
                allow_symbol_change: false,
                container_id: "trading_chart_view",
                "hide_side_toolbar": false,
            });

            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/crypto/' + marketCode);
            xhr.send();
            xhr.responseType = "json";
            xhr.onload = () => {
                let resultJson = xhr.response;
                if (xhr.status === 200) {
                    let marketCodeSplit = resultJson.marketCode.split('-');
                    let cryptoSymbol = marketCodeSplit[1];

                    document.getElementById('crypto_korean_name').innerText = resultJson.koreanName;
                    document.getElementById('crypto_symbol_name').innerText = resultJson.marketCode;
                    document.getElementById('buy_symbol_name').innerText = `${resultJson.koreanName}(${cryptoSymbol})`;
                    document.getElementById('sell_symbol_name').innerText = `${resultJson.koreanName}(${cryptoSymbol})`;
                    document.getElementById('holdCryptoCount').innerText = resultJson.buyCryptoCount;
                    document.getElementById('holdCryptoSymbol').innerText = cryptoSymbol;
                    document.getElementById('sellCryptoSymbol').innerText = `(${cryptoSymbol})`;
                    document.getElementById('buyMarketCode').value = marketCode;
                    document.getElementById('sellMarketCode').value = marketCode;
                } else {
                    document.getElementById('crypto_korean_name').innerText = "비트코인";
                    document.getElementById('crypto_symbol_name').innerText = "KRW-BTC";
                    document.getElementById('buy_symbol_name').innerText = `비트코인(BTC)`;
                    document.getElementById('sell_symbol_name').innerText = `비트코인(BTC)`;
                    document.getElementById('holdCryptoCount').innerText = 0;
                    document.getElementById('holdCryptoSymbol').innerText = "BTC";
                    document.getElementById('sellCryptoSymbol').innerText = `(BTC)`;
                    document.getElementById('buyMarketCode').value = "KRW-BTC";
                    document.getElementById('sellMarketCode').value = "KRW-BTC";
                }
            };
        }

        function startDomesticPricePolling(marketCode) {
            selectedDomesticMarketCode = marketCode;
            renderDomesticPricePlaceholder();
            fetchDomesticExchangePrices(marketCode);
            if (domesticPriceTimer !== null) clearInterval(domesticPriceTimer);
            domesticPriceTimer = setInterval(() => fetchDomesticExchangePrices(selectedDomesticMarketCode), 5000);
        }

        function fetchDomesticExchangePrices(marketCode) {
            fetch('/api/crypto/' + encodeURIComponent(marketCode) + '/domestic-prices')
                .then(response => { if (!response.ok) throw new Error('HTTP ' + response.status); return response.json(); })
                .then(result => {
                    document.getElementById('domestic_price_symbol').innerText = result.symbol || 'BTC';
                    document.getElementById('domestic_price_updated_at').innerText = '갱신 ' + formatUpdatedAt(result.fetchedAt);
                    latestDomesticPriceMap = {};
                    (result.prices || []).forEach(p => { latestDomesticPriceMap[p.exchangeCode] = p.tradePriceKrw; });
                    renderDomesticPriceRows();
                })
                .catch(error => {
                    document.getElementById('domestic_price_updated_at').innerText = '갱신 실패';
                    renderDomesticPricePlaceholder();
                });
        }

        function initializeDomesticExchangeSelect() {
            const sel = document.getElementById('domestic_exchange_select');
            if (!sel) return;
            sel.addEventListener('change', () => { ensureDomesticExchangeSelection(); renderDomesticPriceRows(); });
        }

        function getSelectedDomesticExchangeCodes() {
            const sel = document.getElementById('domestic_exchange_select');
            if (!sel) return [...domesticExchangeCodes];
            return Array.from(sel.selectedOptions).map(o => o.value);
        }

        function ensureDomesticExchangeSelection() {
            const codes = getSelectedDomesticExchangeCodes();
            if (codes.length > 0) return codes;
            const sel = document.getElementById('domestic_exchange_select');
            if (!sel || sel.options.length === 0) return [];
            sel.options[0].selected = true;
            return getSelectedDomesticExchangeCodes();
        }

        function renderDomesticPricePlaceholder() { latestDomesticPriceMap = {}; renderDomesticPriceRows(); }

        function renderDomesticPriceRows() {
            const selected = ensureDomesticExchangeSelection();
            domesticExchangeCodes.forEach(code => {
                const row = document.getElementById('domestic-row-' + code);
                const cell = document.getElementById('domestic-price-' + code);
                const isSelected = selected.includes(code);
                if (row) row.style.display = isSelected ? '' : 'none';
                if (cell && isSelected) {
                    const price = Object.prototype.hasOwnProperty.call(latestDomesticPriceMap, code) ? latestDomesticPriceMap[code] : null;
                    cell.innerText = formatPrice(price);
                }
            });
        }

        function formatPrice(price) {
            if (price === null || price === undefined) return '-';
            return new Intl.NumberFormat('ko-KR').format(price);
        }

        function formatUpdatedAt(timestamp) {
            if (!timestamp) return '-';
            return new Date(timestamp).toLocaleTimeString('ko-KR', { hour12: false });
        }

    </script>
    <!-- TradingView Widget END -->
</th:block>
