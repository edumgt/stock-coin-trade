<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>코인 거래</title></head>
<body layout:fragment="content">

<div class="grid grid-cols-1 gap-5 xl:grid-cols-[minmax(0,1fr)_400px]">

    <!-- Left: chart + buy/sell -->
    <section class="min-w-0 space-y-5">
        <div id="order_info" th:insert="~{trade/orderInfo :: orderInfoFragment}"></div>

        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">

            <!-- Buy form -->
            <form th:action="@{/trade/order/buy}" th:object="${buyCryptoForm}" method="post" class="glass-card p-5">
                <input type="hidden" id="buyMarketCode" name="buyMarketCode" value="KRW-BTC">
                <h3 class="text-lg font-black text-[#F2F2F2]">
                    <span id="buy_symbol_name" class="text-[#FFCC00]">BTC</span> 매수
                </h3>

                <div class="asset-bar mt-4 flex items-center justify-between">
                    <span class="text-sm font-semibold text-[#888]">매수 가능</span>
                    <span th:if="${session.loginMember != null}" class="font-bold text-[#F2F2F2]">
                        <span id="holdAsset" th:text="|${#numbers.formatInteger(memberAsset, 1, 'COMMA')}|">0</span>
                        <span class="ml-1 text-sm text-[#888]">KRW</span>
                    </span>
                    <span th:if="${session.loginMember == null}" class="text-sm text-[#888]">로그인이 필요합니다.</span>
                </div>
                <span th:if="${session.loginMember == null}" id="holdAsset" class="hidden">0</span>

                <div class="mt-4">
                    <label class="section-label mb-2 block" for="buyKrw">주문총액 (KRW)</label>
                    <input type="text" id="buyKrw" th:field="*{buyKrw}" class="dark-input" placeholder="주문 금액 입력"/>
                    <div class="mt-1 text-xs text-[#fb7185]" th:if="${#fields.hasErrors('buyKrw')}" th:errors="*{buyKrw}">숫자만 입력 오류</div>
                </div>

                <div class="mt-3 grid grid-cols-4 gap-2" id="buyQuantityBtnGroup">
                    <button type="button" class="btn-pct-buy">10%</button>
                    <button type="button" class="btn-pct-buy">25%</button>
                    <button type="button" class="btn-pct-buy">50%</button>
                    <button type="button" class="btn-pct-buy">100%</button>
                </div>

                <div class="mt-4">
                    <button th:if="${session.loginMember != null}" class="btn-buy" type="submit">매수</button>
                    <button th:if="${session.loginMember == null}" class="btn-buy" type="button"
                            th:onclick="|location.href='@{/member/login}'|">로그인</button>
                </div>
            </form>

            <!-- Sell form -->
            <form th:action="@{/trade/order/sell}" th:object="${sellCryptoForm}" method="post" class="glass-card p-5">
                <input type="hidden" id="sellMarketCode" name="sellMarketCode" value="KRW-BTC">
                <h3 class="text-lg font-black text-[#F2F2F2]">
                    <span id="sell_symbol_name" class="text-[#fb7185]">BTC</span> 매도
                </h3>

                <div class="asset-bar mt-4 flex items-center justify-between">
                    <span class="text-sm font-semibold text-[#888]">매도 가능</span>
                    <span class="font-bold text-[#F2F2F2]">
                        <span id="holdCryptoCount">-</span>
                        <span id="holdCryptoSymbol" class="ml-1 text-sm text-[#888]">-</span>
                    </span>
                </div>

                <div class="mt-4">
                    <label class="section-label mb-2 block" for="sellCount">주문수량 <span id="sellCryptoSymbol" class="text-[#FFCC00]"></span></label>
                    <input type="text" id="sellCount" th:field="*{sellCount}" class="dark-input" placeholder="주문 수량 입력"/>
                    <div class="mt-1 text-xs text-[#fb7185]" th:if="${#fields.hasErrors('sellCount')}" th:errors="*{sellCount}">숫자만 입력 오류</div>
                </div>

                <div class="mt-3 grid grid-cols-4 gap-2" id="sellQuantityBtnGroup">
                    <button type="button" class="btn-pct-sell">10%</button>
                    <button type="button" class="btn-pct-sell">25%</button>
                    <button type="button" class="btn-pct-sell">50%</button>
                    <button type="button" class="btn-pct-sell">100%</button>
                </div>

                <div class="mt-4">
                    <button th:if="${session.loginMember != null}" class="btn-sell" type="submit">매도</button>
                    <button th:if="${session.loginMember == null}" class="btn-sell" type="button"
                            th:onclick="|location.href='@{/member/login}'|">로그인</button>
                </div>
            </form>

        </div>
    </section>

    <!-- Right: market list -->
    <section class="glass-card overflow-hidden flex flex-col">
        <div class="px-4 py-3 flex items-center gap-2"
             style="border-bottom:1px solid rgba(255,255,255,0.08);">
            <h3 class="text-sm font-black text-[#F2F2F2] tracking-wide uppercase">원화 마켓</h3>
            <span class="badge badge-gold ml-auto">KRW</span>
        </div>
        <div class="overflow-auto flex-1" style="max-height:1320px;">
            <table class="dark-table min-w-full" style="font-size:13px;">
                <thead>
                <tr style="position:sticky;top:0;z-index:10;">
                    <th class="text-left">종목</th>
                    <th class="text-right">현재가</th>
                    <th class="text-right">전일대비</th>
                    <th class="text-right">거래대금</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="item : ${upbitMarketList}">
                    <tr th:onclick="getCryptoChartAndData([[${item.market}]])"
                        style="cursor:pointer;">
                        <td class="font-semibold text-[#F2F2F2]" th:text="${item.koreanName}">-</td>
                        <td class="font-bold text-right" th:id="${item.market} + '-trade_price'">-</td>
                        <td class="text-right" th:id="${item.market} + '-signed_change_rate'">-</td>
                        <td class="text-right text-[#888]" th:id="${item.market} + '-acc_trade_price_24h'">-</td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script th:inline="javascript">const marketCodeListForWebsocket = [[${marketListString}]];</script>
<script th:src="@{/js/order.js}"></script>
</body>
</html>
