apiVersion: apps/v1
kind: Deployment
metadata:
  name: k-serve-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: k-serve-app
  template:
    metadata:
      labels:
        app: k-serve-app
    spec:
      serviceAccountName: k-serve-monitor
      containers:
        - name: app
          image: 086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/python-k-serve:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8200
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: k-serve-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: k-serve-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: k-serve-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: k-serve-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k-serve-secret
                  key: DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: k-serve-secret
                  key: SECRET_KEY
            - name: CMC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k-serve-secret
                  key: CMC_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k-serve-secret
                  key: ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /api/member/me
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/member/me
              port: 8200
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
