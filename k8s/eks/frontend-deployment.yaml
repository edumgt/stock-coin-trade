apiVersion: apps/v1
kind: Deployment
metadata:
  name: k-serve-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k-serve-frontend
  template:
    metadata:
      labels:
        app: k-serve-frontend
    spec:
      containers:
        - name: frontend
          image: 086015456585.dkr.ecr.ap-northeast-2.amazonaws.com/frontend-k-serve:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
