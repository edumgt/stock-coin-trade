networks:
  crypto-infra-net:
    name: crypto-infra-net
    driver: bridge

volumes:
  mariadb_data:

services:
  db:
    image: mariadb:11.4
    container_name: crypto-mock-db
    networks:
      - crypto-infra-net
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: mockinv
      MARIADB_USER: mockinv
      MARIADB_PASSWORD: mockinv1234
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123456" ]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
